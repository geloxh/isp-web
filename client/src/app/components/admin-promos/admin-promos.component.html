<div class="admin-container">
  <div class="admin-header">
    <h1>Manage Promos</h1>
    <a routerLink="/admin" class="btn btn-link">Back to Dashboard</a>
  </div>

  <div class="admin-layout">
    <div class="form-card">
      <h2>{{ isEditing ? 'Edit Promo' : 'Add New Promo' }}</h2>
      <form (submit)="savePromo()">
        <div class="form-group">
          <label>Promo Title</label>
          <input type="text" [(ngModel)]="currentPromo.title" name="title" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="currentPromo.description" name="description" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Discount Code</label>
            <input type="text" [(ngModel)]="currentPromo.discountCode" name="discountCode">
          </div>
          <div class="form-group">
            <label>Discount %</label>
            <input type="number" [(ngModel)]="currentPromo.discountPercentage" name="discountPercentage">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Expiry Date</label>
            <input type="date" [(ngModel)]="currentPromo.expiryDate" name="expiryDate">
          </div>
          <div class="form-group checkbox">
            <label>
              <input type="checkbox" [(ngModel)]="currentPromo.isActive" name="isActive"> Active
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" [(ngModel)]="currentPromo.imageUrl" name="imageUrl">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">{{ isEditing ? 'Update' : 'Create' }} Promo</button>
          <button type="button" class="btn btn-link" *ngIf="isEditing" (click)="resetForm()">Cancel</button>
        </div>
      </form>
    </div>

    <div class="list-card">
      <h2>Existing Promos</h2>
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Code</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let promo of promos">
              <td>{{ promo.title }}</td>
              <td>{{ promo.discountCode || 'N/A' }}</td>
              <td>
                <span class="status-badge" [class.active]="promo.isActive">
                  {{ promo.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="actions">
                <button class="btn-icon edit" (click)="editPromo(promo)">✎</button>
                <button class="btn-icon delete" (click)="deletePromo(promo._id!)">🗑</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
